<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>生竞押题擂台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0f0b;--card:rgba(255,255,255,.035);--card-h:rgba(255,255,255,.06);
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.13);
  --ac:#5eead4;--ac2:#2dd4bf;--ac-dim:rgba(94,234,212,.08);
  --tx:#d1e5da;--tx2:#3f5c48;--gold:#fbbf24;
  --ok:#4ade80;--ok-d:rgba(74,222,128,.1);--no:#fb7185;--no-d:rgba(251,113,133,.1);
}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}

/* ═══════ 壁纸背景 ═══════ */
.wb{position:fixed;inset:0;z-index:0;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  opacity:.2;pointer-events:none;filter:saturate(.7)brightness(.85);
  transition:opacity 1.2s ease}
/* 深色渐变遮罩，保证内容可读 */
.wb::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 20%,rgba(10,15,11,.5),rgba(10,15,11,.92) 72%)}
/* 备用纯色底（图片加载前） */
body::before{content:'';position:fixed;inset:0;z-index:-1;background:var(--bg)}

/* 装饰光晕 */
.g1{position:fixed;width:500px;height:500px;border-radius:50%;background:#047857;
  top:-250px;left:-180px;opacity:.12;filter:blur(140px);pointer-events:none;z-index:0}
.g2{position:fixed;width:380px;height:380px;border-radius:50%;background:#065f46;
  bottom:-180px;right:-140px;opacity:.08;filter:blur(120px);pointer-events:none;z-index:0}

/* ═══════ 容器 ═══════ */
.W{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:44px 16px 28px}

/* ═══════ 头部 ═══════ */
.hd{text-align:center;margin-bottom:30px}
.hd h1{font-size:44px;font-weight:900;letter-spacing:-2px;line-height:1.15;
  background:linear-gradient(135deg,#a7f3d0,#34d399,#059669);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hd .s{color:var(--tx2);margin-top:5px;font-size:12px;font-weight:300;letter-spacing:3px}

/* ═══════ 阶段切换 ═══════ */
.tabs{display:flex;gap:3px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:3px;margin-bottom:12px}
.tb{flex:1;padding:10px 6px;border:none;border-radius:9px;background:0;color:var(--tx2);font-size:12.5px;font-weight:600;cursor:pointer;transition:.25s;font-family:inherit}
.tb:hover{color:var(--tx);background:rgba(255,255,255,.025)}
.tb.on{background:linear-gradient(135deg,#34d399,#059669);color:#000;font-weight:800;box-shadow:0 2px 16px rgba(5,150,105,.35)}

/* ═══════ 分享栏 + 用户名 ═══════ */
.bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;margin-bottom:10px;font-size:11px;color:var(--tx2)}
.bar input{flex:1;background:0;border:0;color:var(--tx);font-size:11px;outline:0;font-family:'Courier New',monospace}
.bar button{padding:4px 14px;background:var(--ac-dim);color:var(--ac);border:1px solid rgba(94,234,212,.18);border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;transition:.2s;white-space:nowrap}
.bar button:hover{background:var(--ac);color:#000}
.ub{display:flex;align-items:center;gap:8px;margin-bottom:26px;font-size:12px;color:var(--tx2)}
.ub label{white-space:nowrap}
.ub input{padding:7px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;color:var(--tx);font-size:13px;outline:0;font-family:inherit;width:170px;transition:.2s}
.ub input:focus{border-color:var(--ac)}

/* ═══════ 表单 ═══════ */
.fc{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:20px;margin-bottom:22px}
.fc h2{font-size:15px;font-weight:800;margin-bottom:14px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.fg.w{grid-column:1/-1}
.fg label{display:block;font-size:11px;color:var(--tx2);margin-bottom:4px;font-weight:600}
.fg input,.fg textarea{width:100%;padding:8px 12px;background:rgba(255,255,255,.02);border:1px solid var(--bdr);border-radius:8px;color:var(--tx);font-size:13px;outline:0;font-family:inherit;transition:.2s;resize:vertical}
.fg input::placeholder,.fg textarea::placeholder{color:#1e3326}
.fg input:focus,.fg textarea:focus{border-color:var(--ac)}
.pbtn{width:100%;padding:12px;background:linear-gradient(135deg,#34d399,#059669);color:#000;border:0;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:.2s;letter-spacing:.5px}
.pbtn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(5,150,105,.35)}
.pbtn:active{transform:translateY(0)}

/* ═══════ 区域标题 ═══════ */
.st{margin-bottom:14px;font-size:16px;font-weight:800}
.st .c{font-size:12px;color:var(--tx2);font-weight:400;margin-left:5px}

/* ═══════ 押题卡片 ═══════ */
.cd{background:var(--card);border:1px solid var(--bdr);border-radius:11px;padding:14px 16px;margin-bottom:8px;transition:.2s}
.cd:hover{background:var(--card-h);border-color:var(--bdr2)}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.nm{font-weight:800;font-size:13.5px;color:var(--ac)}
.tm{font-size:10px;color:var(--tx2)}
.tp{font-size:15px;font-weight:700;margin-bottom:3px;line-height:1.45}
.dt{font-size:12px;color:#5c8a6e;line-height:1.6}
.pay{margin-top:8px}
.pay img{max-width:100px;max-height:100px;border-radius:6px;border:1px solid var(--bdr)}

/* ═══════ 评估 ═══════ */
.eh{color:var(--tx2);font-size:12px;margin-bottom:16px;padding:10px 14px;background:var(--card);border-radius:9px;border-left:3px solid var(--ac);line-height:1.5}
.eb{display:flex;gap:6px;margin-top:12px}
.eb button{flex:1;padding:8px;border:1px solid var(--bdr);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;background:0}
.eb .ok{color:var(--ok)}.eb .ok:hover,.eb .ok.on{background:var(--ok-d);border-color:var(--ok)}
.eb .no{color:var(--no)}.eb .no:hover,.eb .no.on{background:var(--no-d);border-color:var(--no)}

/* ═══════ 排行榜 ═══════ */
.rl{display:flex;flex-direction:column;gap:7px}
.ri{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:1px solid var(--bdr);border-radius:11px;transition:.2s;flex-wrap:wrap}
.ri:hover{background:var(--card-h)}
.ri.top{border-color:rgba(251,191,36,.2);background:rgba(251,191,36,.03)}
.ri .rk{font-size:20px;font-weight:900;width:32px;text-align:center;color:var(--tx2);flex-shrink:0}
.ri.top .rk{color:var(--gold)}
.ri .inf{flex:1;min-width:0}
.ri .nm{font-weight:800;font-size:14px}
.ri .st{font-size:11px;color:var(--tx2);margin-top:2px}
.ri .sc{font-size:30px;font-weight:900;color:var(--gold);min-width:42px;text-align:center;flex-shrink:0;line-height:1}
.ri .sl{font-size:9px;color:var(--tx2);text-align:center;flex-shrink:0;width:42px}
.ri .rp{flex-shrink:0}
.rpb{display:inline-block;font-size:11px;padding:4px 10px;background:var(--ac-dim);color:var(--ac);border-radius:6px;cursor:pointer;transition:.2s;font-weight:700;border:1px solid rgba(94,234,212,.18);user-select:none}
.rpb:hover{background:var(--ac);color:#000}
.pp{display:block;margin-top:8px;max-width:160px;border-radius:8px;border:1px solid var(--bdr2);box-shadow:0 4px 24px rgba(0,0,0,.5)}
.empty{text-align:center;padding:48px 20px;color:var(--tx2);font-size:13px}

/* ═══════ 底部 ═══════ */
.ft{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:14px;border-top:1px solid var(--bdr);font-size:11px;color:var(--tx2)}
.ft button{padding:4px 12px;background:0;border:1px solid var(--bdr);border-radius:6px;color:var(--tx2);cursor:pointer;font-size:11px;font-family:inherit;transition:.2s}
.ft button:hover{border-color:var(--ac);color:var(--ac)}

/* ═══════ Toast ═══════ */
#toast{position:fixed;bottom:-60px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;transition:bottom .35s cubic-bezier(.4,0,.2,1);white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
#toast.show{bottom:28px}
#toast.ok{background:var(--ok);color:#fff}
#toast.err{background:var(--no);color:#fff}

/* ═══════ 响应式 ═══════ */
@media(max-width:600px){
  .hd h1{font-size:32px;letter-spacing:-1px}
  .fg{grid-template-columns:1fr}
  .W{padding:28px 12px 20px}
  .tb{font-size:11px;padding:9px 4px}
  .ri .sc{font-size:24px}
}
:focus-visible{outline:2px solid var(--ac);outline-offset:2px}
@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important;animation:none!important}}
</style>
</head>
<body>

<!-- 壁纸背景 -->
<div class="wb" id="wb"></div>
<div class="g1"></div>
<div class="g2"></div>

<div class="W">
  <header class="hd">
    <h1>生竞押题擂台</h1>
    <p class="s">精准押题 · 贡献至上 · 联赛必胜</p>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tb on" id="t0" role="tab" onclick="go(0)">押题阶段</button>
    <button class="tb" id="t1" role="tab" onclick="go(1)">评估阶段</button>
    <button class="tb" id="t2" role="tab" onclick="go(2)">成绩公布</button>
  </nav>

  <div class="bar" id="sbar">
    <span>分享链接</span><input id="surl" readonly><button onclick="cp()">复制</button>
  </div>

  <div class="ub">
    <label for="un">你的名字</label>
    <input id="un" placeholder="回车确认" onchange="sn()" onkeydown="if(event.key==='Enter')sn()">
  </div>

  <main>
    <!-- ===== 押题阶段 ===== -->
    <section id="p0">
      <div class="fc">
        <h2>提交你的押题</h2>
        <div class="fg">
          <div class="fg w">
            <label for="pn">你的名字</label>
            <input id="pn" placeholder="真实姓名或昵称">
          </div>
          <div class="fg w">
            <label for="pt">押题知识点</label>
            <input id="pt" placeholder="例：光合作用的C4途径">
          </div>
          <div class="fg w">
            <label for="pd">详细说明（选填）</label>
            <textarea id="pd" placeholder="说说为什么觉得会考..." rows="2"></textarea>
          </div>
          <div class="fg w">
            <label for="pp">付款码图片链接（选填，公布时展示）</label>
            <input id="pp" placeholder="粘贴收款码截图的图片URL">
          </div>
        </div>
        <button class="pbtn" onclick="add()">提交押题</button>
      </div>
      <div class="st">已提交的押题 <span class="c" id="pc">0</span></div>
      <div id="pl"></div>
    </section>

    <!-- ===== 评估阶段 ===== -->
    <section id="p1" style="display:none">
      <div class="eh" id="ehint">请评估每个人的押题是否准确</div>
      <div id="el"></div>
    </section>

    <!-- ===== 成绩公布 ===== -->
    <section id="p2" style="display:none">
      <div class="st">押题贡献榜</div>
      <div id="rl"></div>
    </section>
  </main>

  <footer class="ft">
    <span id="lu">尚未加载</span>
    <button onclick="ref()">刷新数据</button>
  </footer>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════
   生竞押题擂台 · 全部逻辑
   数据存储：jsonblob.com（免费·无需注册）
   ═══════════════════════════════════════ */

const API = 'https://jsonblob.com/api/jsonBlob';
const REFRESH = 15000; // 15秒自动刷新

// 可用壁纸列表（每次打开随机一张）
const WALLS = [
  'https://w.wallhaven.1lou.top/full/po/wallhaven-poloze.jpg',
  'https://w.wallhaven.1lou.top/full/9m/wallhaven-9m2mo1.jpg',
  'https://w.wallhaven.1lou.top/full/dp/wallhaven-dp36dg.jpg',
  'https://w.wallhaven.1lou.top/full/85/wallhaven-857mlj.jpg',
  'https://w.wallhaven.1lou.top/full/l3/wallhaven-l3x1ky.jpg'
];

let bid = null;          // jsonblob ID
let D = { predictions:[], evaluations:[], phase:0 };
let me = localStorage.getItem('bio_pred_name') || '';
let timer = null;
let toastT = null;

// ═══ 初始化 ═══
async function init(){
  // 壁纸
  pickWall();
  // 用户名
  $('un').value = me;
  $('pn').value = me;
  // URL 参数
  const p = new URLSearchParams(location.search);
  bid = p.get('b');
  try{
    if(bid){ await load(); }
    else{ await create(); }
    $('surl').value = location.href;
    $('sbar').style.display = 'flex';
  }catch(e){
    toast(bid?'数据加载失败，请检查链接':'创建失败，请检查网络后刷新','err');
  }
  render();
  timer = setInterval(async()=>{ try{await load();render();}catch(e){} }, REFRESH);
}

// ═══ 壁纸 ═══
function pickWall(){
  // 尝试从 localStorage 复用同一张，保持一致
  let idx = localStorage.getItem('bio_wall_idx');
  if(idx===null) idx = Math.floor(Math.random()*WALLS.length);
  else idx = parseInt(idx);
  const img = new Image();
  img.onload = ()=>{ $('wb').style.backgroundImage = 'url('+WALLS[idx]+')'; };
  img.onerror = ()=>{
    // 加载失败就换一张
    idx = (idx+1) % WALLS.length;
    localStorage.setItem('bio_wall_idx', idx);
    $('wb').style.backgroundImage = 'url('+WALLS[idx]+')';
  };
  img.src = WALLS[idx];
  localStorage.setItem('bio_wall_idx', idx);
}

// ═══ 数据操作 ═══
async function create(){
  const r = await fetch(API,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(D)
  });
  if(!r.ok) throw new Error();
  bid = r.headers.get('Location').split('/').pop();
  const u = new URL(location);
  u.searchParams.set('b',bid);
  history.replaceState({},'',u);
}

async function load(){
  const r = await fetch(API+'/'+bid);
  if(!r.ok) throw new Error();
  D = await r.json();
  if(!D.predictions) D.predictions = [];
  if(!D.evaluations) D.evaluations = [];
  if(D.phase===undefined) D.phase = 0;
}

async function save(){
  if(!bid) return;
  try{
    // 先读最新再合并，防止覆盖
    const r = await fetch(API+'/'+bid);
    if(!r.ok) throw new Error();
    const latest = await r.json();
    if(Array.isArray(latest.predictions)){
      const ids = new Set(latest.predictions.map(p=>p.id));
      for(const p of D.predictions) if(!ids.has(p.id)) latest.predictions.push(p);
      D.predictions = latest.predictions;
    }
    if(Array.isArray(latest.evaluations)){
      const keys = new Set(latest.evaluations.map(e=>e.v+'|'+e.tid));
      for(const e of D.evaluations) if(!keys.has(e.v+'|'+e.tid)) latest.evaluations.push(e);
      D.evaluations = latest.evaluations;
    }
    D.phase = latest.phase!==undefined ? latest.phase : D.phase;
  }catch(e){
    // 降级：直接覆盖
  }
  const r2 = await fetch(API+'/'+bid,{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(D)
  });
  if(!r2.ok) throw new Error();
}

// ═══ 押题 ═══
async function add(){
  const name = $('pn').value.trim();
  const topic = $('pt').value.trim();
  const detail = $('pd').value.trim();
  const pay = $('pp').value.trim();
  if(!name) return toast('请输入你的名字','err');
  if(!topic) return toast('请输入押题知识点','err');
  me = name;
  localStorage.setItem('bio_pred_name',me);
  $('un').value = me;
  const pred = {
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,7),
    name, topic, detail, pay,
    time: new Date().toISOString()
  };
  D.predictions.push(pred);
  try{
    await save();
    toast('押题成功');
    $('pt').value = '';
    $('pd').value = '';
    renderPL();
  }catch(e){
    D.predictions.pop();
    toast('提交失败，请重试','err');
  }
}

// ═══ 评估 ═══
async function vote(tid,sc){
  if(!me) return toast('请先输入你的名字','err');
  const i = D.evaluations.findIndex(e=>e.v===me&&e.tid===tid);
  if(i>=0){ D.evaluations[i].sc=sc; D.evaluations[i].time=new Date().toISOString(); }
  else{ D.evaluations.push({v:me,tid,sc,time:new Date().toISOString()}); }
  try{ await save(); toast(sc?'已标记为准确':'已标记为不准确'); renderEL(); }
  catch(e){ toast('保存失败','err'); }
}

// ═══ 阶段切换 ═══
async function go(ph){
  if(D.phase===ph) return;
  const prev = D.phase;
  D.phase = ph;
  try{ await save(); render(); toast(['押题阶段','评估阶段','成绩公布'][ph]); }
  catch(e){ D.phase=prev; render(); toast('切换失败','err'); }
}

// ═══ 渲染总控 ═══
function render(){
  for(let i=0;i<3;i++){
    $('p'+i).style.display = i===D.phase ? 'block' : 'none';
    $('t'+i).classList.toggle('on', i===D.phase);
  }
  $('lu').textContent = '更新：'+new Date().toLocaleTimeString('zh-CN');
  if(D.phase===0) renderPL();
  else if(D.phase===1) renderEL();
  else renderRL();
}

// ═══ 渲染：押题列表 ═══
function renderPL(){
  const ps = D.predictions;
  $('pc').textContent = ps.length;
  if(!ps.length){ $('pl').innerHTML='<div class="empty">还没有人押题，做第一个吧</div>'; return; }
  $('pl').innerHTML = ps.map(p=>`
    <div class="cd">
      <div class="ch"><span class="nm">${esc(p.name)}</span><span class="tm">${ft(p.time)}</span></div>
      <div class="tp">${esc(p.topic)}</div>
      ${p.detail?'<div class="dt">'+esc(p.detail)+'</div>':''}
      ${p.pay?'<div class="pay"><img src="'+esc(p.pay)+'" alt="付款码" onerror="this.parentElement.style.display=\'none\'"></div>':''}
    </div>`).join('');
}

// ═══ 渲染：评估列表 ═══
function renderEL(){
  const ps = D.predictions, eh = $('ehint'), el = $('el');
  const others = me ? ps.filter(p=>p.name!==me) : ps;
  if(!ps.length){
    eh.textContent='还没有人押题';
    el.innerHTML='<div class="empty">暂无押题</div>'; return;
  }
  if(!me){ eh.textContent='请先输入你的名字'; }
  else if(!others.length){ eh.textContent='只有你自己押了题，无法评估'; }
  else{
    const done = others.filter(p=>D.evaluations.some(e=>e.v===me&&e.tid===p.id)).length;
    eh.textContent = '已评估 '+done+' / '+others.length+' 个（不能评估自己）';
  }
  if(!others.length){ el.innerHTML='<div class="empty">无可评估的押题</div>'; return; }
  el.innerHTML = others.map(p=>{
    const my = D.evaluations.find(e=>e.v===me&&e.tid===p.id);
    return `<div class="cd">
      <div class="ch"><span class="nm">${esc(p.name)}</span><span class="tm">${ft(p.time)}</span></div>
      <div class="tp">${esc(p.topic)}</div>
      ${p.detail?'<div class="dt">'+esc(p.detail)+'</div>':''}
      <div class="eb">
        <button class="ok ${my&&my.sc?'on':''}" onclick="vote('${p.id}',1)">准确</button>
        <button class="no ${my&&!my.sc?'on':''}" onclick="vote('${p.id}',0)">不准确</button>
      </div>
    </div>`}).join('');
}

// ═══ 渲染：排行榜 ═══
function renderRL(){
  const ps = D.predictions, es = D.evaluations, rl = $('rl');
  if(!ps.length){ rl.innerHTML='<div class="empty">暂无数据</div>'; return; }
  // 按人名聚合
  const m = {};
  for(const p of ps){
    if(!m[p.name]) m[p.name]={name:p.name,pay:'',ok:0,no:0,total:0};
    if(p.pay) m[p.name].pay = p.pay;
  }
  for(const e of es){
    const p = ps.find(x=>x.id===e.tid);
    if(p&&m[p.name]){ m[p.name].total++; if(e.sc) m[p.name].ok++; else m[p.name].no++; }
  }
  const rank = Object.values(m).sort((a,b)=>{
    if(b.ok!==a.ok) return b.ok-a.ok;
    const ra=a.total?a.ok/a.total:0, rb=b.total?b.ok/b.total:0;
    if(rb!==ra) return rb-ra;
    return b.total-a.total;
  });
  const voters = new Set(es.map(e=>e.v)).size;
  rl.innerHTML = '<p style="color:var(--tx2);font-size:11px;margin-bottom:12px">'+(voters?voters+' 人参与评估':'尚无评估')+'</p><div class="rl">'
    + rank.map((s,i)=>{
      const rate = s.total ? Math.round(s.ok/s.total*100) : 0;
      return `<div class="ri ${i<3?'top':''}">
        <div class="rk">${i+1}</div>
        <div class="inf">
          <div class="nm">${esc(s.name)}</div>
          <div class="st">准确 ${s.ok} / ${s.total} 次 · 准确率 ${rate}%</div>
        </div>
        <div><div class="sc">${s.ok}</div><div class="sl">贡献值</div></div>
        ${s.pay?'<div class="rp"><span class="rpb" onclick="tpay(this,\''+esc(s.pay)+'\')">打赏</span></div>':''}
      </div>`}).join('') + '</div>';
}

// ═══ 打赏弹窗 ═══
function tpay(btn,url){
  const old = btn.parentElement.querySelector('.pp');
  if(old){ old.remove(); return; }
  const img = document.createElement('img');
  img.src=url; img.className='pp'; img.alt='付款码';
  img.onerror=function(){this.remove()};
  btn.parentElement.appendChild(img);
}

// ═══ 用户名 ═══
function sn(){
  me = $('un').value.trim();
  localStorage.setItem('bio_pred_name',me);
  $('pn').value = me;
}

// ═══ 分享 ═══
function cp(){
  const u = $('surl');
  u.select();
  if(navigator.clipboard) navigator.clipboard.writeText(u.value).then(()=>toast('链接已复制'));
  else{ document.execCommand('copy'); toast('链接已复制'); }
}

// ═══ 手动刷新 ═══
async function ref(){
  try{ await load(); render(); toast('已刷新'); }
  catch(e){ toast('刷新失败','err'); }
}

// ═══ 工具 ═══
function $(id){ return document.getElementById(id); }
function esc(s){ return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):''; }
function ft(s){ if(!s) return ''; try{ return new Date(s).toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } }
function toast(msg,type){
  const t=$('toast'); t.textContent=msg;
  t.className='toast show '+(type==='err'?'err':'ok');
  if(toastT) clearTimeout(toastT);
  toastT=setTimeout(()=>{t.className='toast'},2500);
}

// ═══ 启动 ═══
window.addEventListener('DOMContentLoaded', init);
</script>
